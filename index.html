<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>youtube UI clone</title>
    <link rel="stylesheet" href="./styles/general.css">
    <link rel="stylesheet" href="./styles/header.css">
    <link rel="stylesheet" href="./styles/grid.css">
     
      
</head>
<body>
     <!--header start-->
     <div class="header">
       <div class="left-section"> 
        <img src="Menu.png" class="Menu-icon">
        <img src="youtube icon.png" class="youtube-logo">
       </div>
       <div class="middle-section">
      <input type="text" placeholder="search" class="search-bar">
      <button class="search-button" >search</button>

      <img src="styles/Mic.svg" alt="Mic">
        </div>
      <div class="right-section">
        <img src="Login.png" alt="Login">
        <img src="styles/Notification.png" alt="Notification">
        <img src="account_circle.png" alt="account">
      </div>
      </div>  
      <div class="sidebar">
        <div class="sidebar-icon">
          <img src="Home.png" alt="Home">
          <div>Home</div>
        </div>
        <div class="sidebar-icon">
          <img src="subscripsion.png" alt="subscripsion">
        <div>subscripsion</div>
      </div>  
      <div class="sidebar-icon">
        <img src="video.png" alt="video">
        <div>video</div>
      </div>
      <div class="sidebar-icon">
        <img src="settings.png" alt="settings">
        <div>settings</div>
      </div>
         <!--header end-->
     </body>
</html>
